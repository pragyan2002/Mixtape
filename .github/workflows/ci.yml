name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck + Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (skip postinstall binary fetch)
        run: npm ci --ignore-scripts

      - name: Run check
        run: npm run check

  build-test:
    name: Build (compile only)
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (skip postinstall binary fetch)
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
