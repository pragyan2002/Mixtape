appId: com.pragyan.mixtape
productName: Mixtape
copyright: "Copyright © 2026 Pragyan Shukla"

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - "!**/*.map"

extraResources:
  - from: resources/bin/
    to: bin/
    filter:
      - "yt-dlp*"
      - "ffmpeg*"
      - "ffprobe*"

win:
  target:
    - target: nsis
      arch: [x64]

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.music

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Audio

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

dmg:
  sign: false

publish: null
